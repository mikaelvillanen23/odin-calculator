<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles.css">
  <title>Calculator project</title>
</head>
<body>
  <div class="base">
    <h2>Calculator</h2>
    <div class="display">1337 + 6700</div> <!--max 23 units-->
    <div class="buttonContainer">
      <div class="row">
        <div id="clear" class="button">C</div>
        <div id="del" class="button">Del</div>
        <div id="equals" class="button">=</div>
      </div>
        <div class="row">
          <div id="7" class="button">7</div>
          <div id="8" class="button">8</div>
          <div id="9" class="button">9</div>
          <div id="divide" class="button">/</div>
        </div>
        <div class="row">
          <div id="4" class="button">4</div>
          <div id="5" class="button">5</div>
          <div id="6" class="button">6</div>
          <div id="multiply" class="button">x</div>
        </div>
        <div class="row">
          <div id="1" class="button">1</div>
          <div id="2" class="button">2</div>
          <div id="3" class="button">3</div>
          <div id="subtract" class="button">–</div>
        </div>
        <div class="row">
          <div id="signToggle" class="button">-/+</div>
          <div id="0" class="button">0</div>
          <div id="point" class="button">.</div>
          <div id="add" class="button">+</div>
        </div>
    </div>
  </div>

<script src="./script.js"></script>

</body>
</html>
