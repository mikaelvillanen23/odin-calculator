<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles.css">
  <title>Calculator project</title>
</head>
<body>
  <div class="base">
    <h2>Calculator</h2>
    <div class="display">0</div>
    <div class="buttonContainer">
      <div class="row">
        <div id="clear" class="button">C</div>
        <div id="del" class="button">Del</div>
        <div id="equals" class="button">=</div>
      </div>
        <div class="row">
          <div id="7" class="button numberButton">7</div>
          <div id="8" class="button numberButton">8</div>
          <div id="9" class="button numberButton">9</div>
          <div id="divide" class="button operator">÷</div>
        </div>
        <div class="row">
          <div id="4" class="button numberButton">4</div>
          <div id="5" class="button numberButton">5</div>
          <div id="6" class="button numberButton">6</div>
          <div id="multiply" class="button operator">×</div>
        </div>
        <div class="row">
          <div id="1" class="button numberButton">1</div>
          <div id="2" class="button numberButton">2</div>
          <div id="3" class="button numberButton">3</div>
          <div id="subtract" class="button operator">−</div>
        </div>
        <div class="row">
          <div id="signToggle" class="button">-/+</div>
          <div id="0" class="button numberButton">0</div>
          <div id="point" class="button">.</div>
          <div id="add" class="button operator">+</div>
        </div>
    </div>
  </div>

<script src="./script.js"></script>

</body>
</html>
